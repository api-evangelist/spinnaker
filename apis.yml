aid: spinnaker
name: Spinnaker
description: >-
  Spinnaker is an open source multi-cloud continuous delivery platform for releasing
  software changes with high velocity and confidence. Originally developed at Netflix
  and Google, Spinnaker provides a deployment platform supporting AWS, GCP, Azure,
  Kubernetes, and other cloud providers. The Gate API is the primary REST interface
  for all Spinnaker operations.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
