apis:
  - aid: spinnaker:spinnaker-gate-api
    name: Spinnaker Gate API
    description: >-
      Gate is the Spinnaker API Gateway — the primary REST interface for all Spinnaker
      operations including application management, pipeline execution, cluster management,
      and infrastructure discovery. Gate runs on port 8084 and is used by the Spinnaker UI
      (Deck) as well as external automation scripts and integrations. Supports OAuth 2.0,
      SAML, LDAP, and X.509 certificate authentication.
    humanURL: https://spinnaker.io/docs/reference/api/
    tags:
      - Applications
      - Clusters
      - Continuous Delivery
      - Deployments
      - Pipelines
